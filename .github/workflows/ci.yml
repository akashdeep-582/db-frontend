name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: db-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: db-frontend

      - name: Type check all apps
        run: |
          npm run typecheck -w shell
          npm run typecheck -w owner-app
          npm run typecheck -w admin-app
          npm run typecheck -w tenant-app
        working-directory: db-frontend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: db-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: db-frontend

      - name: Build all apps
        run: |
          npm run build -w owner-app
          npm run build -w admin-app
          npm run build -w tenant-app
          npm run build -w shell
        working-directory: db-frontend
